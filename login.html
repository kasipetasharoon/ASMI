<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASMI - Portal Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04180d;
            --surface: #081f10;
            --g5: #39d174;
            --g4: #22a85a;
            --text: #e8f5ec;
            --muted: #7fb896;
            --gold: #d4a843;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Reusing your background rings */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(57, 209, 116, 0.1);
            pointer-events: none;
        }

        .login-card {
            background: rgba(8, 31, 16, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(57, 209, 116, 0.2);
            padding: 3rem;
            border-radius: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--g5), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(57, 209, 116, 0.2);
            padding: 12px 15px;
            border-radius: 12px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--g5);
            background: rgba(57, 209, 116, 0.05);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--g4), var(--g5));
            color: #0a2e1a;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(57, 209, 116, 0.3);
        }

        .footer-link {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .footer-link a {
            color: var(--g5);
            text-decoration: none;
        }

        /* Leaf Particles */
        #particles { position: fixed; inset: 0; pointer-events: none; }
        .leaf { position: absolute; animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="particles"></div>
    <div class="ring" style="width: 500px; height: 500px; top: -10%; right: -10%;"></div>
    <div class="ring" style="width: 400px; height: 400px; bottom: -5%; left: -5%;"></div>

    <div class="login-card">
        <div class="logo-text">ASMI</div>
        <div class="subtitle">MEMBER & ADMIN PORTAL</div>

        <div id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="name@iare.ac.in">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn-login" onclick="handleLogin()">Sign In</button>
        </div>

        <div class="footer-link">
            Not a club member? <a href="index.html#join-section">Apply to Join</a>
        </div>
        <div class="footer-link" style="margin-top: 10px;">
            <a href="index.html" style="color: var(--muted);">← Back to Home</a>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYnbcULU8Kkp2JkDRk4onTbN8rvuw9YEc",
            authDomain: "asmi-76d0b.firebaseapp.com",
            projectId: "asmi-76d0b",
            storageBucket: "asmi-76d0b.firebasestorage.app",
            messagingSenderId: "557411474138",
            appId: "1:557411474138:web:715d2818998d5d39f263e3",
            measurementId: "G-TPHYEJWEJZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.handleLogin = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if(!email || !password) return alert("Please fill all fields");

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Check Permissions in RTDB
                const adminRef = ref(db, 'admins/' + user.uid);
                const memberRef = ref(db, 'members/' + user.uid);

                const [adminSnap, memberSnap] = await Promise.all([get(adminRef), get(memberSnap)]);

                if (adminSnap.exists() || memberSnap.exists()) {
                    // Success - redirect to main site
                    window.location.href = "index.html"; 
                } else {
                    // Authenticated but not in ASMI Database
                    await auth.signOut();
                    alert("Access Denied: Your account is not registered as an ASMI Member or Admin.");
                }

            } catch (error) {
                alert(error.message);
            }
        };

        // Simple Leaves Animation
        const particles = document.getElementById('particles');
        const leafEmojis = ['🍃', '🌿', '🌱'];
        setInterval(() => {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.textContent = leafEmojis[Math.floor(Math.random()*leafEmojis.length)];
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = (Math.random() * 3 + 2) + 's';
            particles.appendChild(leaf);
            setTimeout(() => leaf.remove(), 5000);
        }, 300);
    </script>
</body>
</html>
