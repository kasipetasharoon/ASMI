<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASMI - Member Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #04180d;
            --surface: #081f10;
            --g1: #0a2e1a;
            --g4: #22a85a;
            --g5: #39d174;
            --text: #e8f5ec;
            --muted: #7fb896;
            --gold: #d4a843;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background Elements */
        #particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        .leaf { position: absolute; animation: fall linear infinite; opacity: 0.6; }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .ring {
            position: absolute; border-radius: 50%;
            border: 1px solid rgba(57, 209, 116, 0.05);
            pointer-events: none; z-index: 0;
        }

        /* Login Card */
        .login-card {
            background: rgba(8, 31, 16, 0.7);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(57, 209, 116, 0.15);
            padding: 3rem 2.5rem;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .logo-area { margin-bottom: 2rem; }
        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--g5), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .logo-sub {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: -5px;
        }

        .instruction {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        /* Forms */
        .form-group { text-align: left; margin-bottom: 1.2rem; }
        label {
            display: block;
            font-size: 0.75rem;
            color: var(--g5);
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(57, 209, 116, 0.2);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        input:focus {
            border-color: var(--g5);
            background: rgba(57, 209, 116, 0.08);
            box-shadow: 0 0 15px rgba(57, 209, 116, 0.1);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--g4), var(--g5));
            color: var(--g1);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
            transition: 0.3s;
            font-family: 'Outfit', sans-serif;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(57, 209, 116, 0.3);
        }
        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .back-link:hover { color: var(--g5); }

        #errorMessage {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 1rem;
            min-height: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="particles"></div>
    <div class="ring" style="width: 600px; height: 600px; top: -150px; left: -150px;"></div>
    <div class="ring" style="width: 400px; height: 400px; bottom: -100px; right: -100px;"></div>

    <div class="login-card">
        <div class="logo-area">
            <h1 class="logo-text">ASMI</h1>
            <div class="logo-sub">Internal Portal</div>
        </div>
        
        <p class="instruction">Enter your credentials to access the ASMI hub.</p>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="email@iare.ac.in" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div id="errorMessage"></div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">Sign In to Hub</button>

        <a href="ASMI_website_full.html" class="back-link">← Return to Public Site</a>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    // We add 'getDatabase' and specify the URL
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDYnbcULU8Kkp2JkDRk4onTbN8rvuw9YEc",
        authDomain: "asmi-76d0b.firebaseapp.com",
        projectId: "asmi-76d0b",
        storageBucket: "asmi-76d0b.firebasestorage.app",
        messagingSenderId: "557411474138",
        appId: "1:557411474138:web:715d2818998d5d39f263e3",
        measurementId: "G-TPHYEJWEJZ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    // CRITICAL FIX: Explicitly link your Asia-Southeast Database URL
    const db = getDatabase(app, "https://asmi-76d0b-default-rtdb.asia-southeast1.firebasedatabase.app/");

    window.handleLogin = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const errDisplay = document.getElementById('errorMessage');

        if(!email || !password) {
            errDisplay.textContent = "Please enter both email and password.";
            return;
        }

        btn.disabled = true;
        btn.textContent = "Verifying...";
        errDisplay.textContent = "";

        try {
            // 1. Authenticate with Firebase Auth
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 2. Check Permissions in Realtime Database
            // We look in both folders: admins and members
            const adminRef = ref(db, `admins/${user.uid}`);
            const memberRef = ref(db, `members/${user.uid}`);

            console.log("Checking DB for UID:", user.uid); // Debug log

            const [adminSnap, memberSnap] = await Promise.all([
                get(adminRef),
                get(memberRef)
            ]);

            if (adminSnap.exists() || memberSnap.exists()) {
                // SUCCESS: Redirect to your home page
                // Change "index.html" if your file has a different name
                window.location.href = "index.html"; 
            } else {
                // UNAUTHORIZED: Sign them out so they don't stay logged in
                await signOut(auth);
                errDisplay.textContent = "Access Denied: UID not found in ASMI Database.";
                btn.disabled = false;
                btn.textContent = "Sign In to Hub";
            }

        } catch (error) {
            btn.disabled = false;
            btn.textContent = "Sign In to Hub";
            console.error("Login Error:", error);
            
            if(error.code === 'auth/invalid-credential') {
                errDisplay.textContent = "Invalid email or password.";
            } else if (error.code === 'auth/network-request-failed') {
                errDisplay.textContent = "Network error. Check your connection.";
            } else {
                errDisplay.textContent = "Login failed. Check Console (F12).";
            }
        }
    };

    // Aesthetic Leaf Particles Logic
    const container = document.getElementById('particles');
    const emojis = ['🍃', '🌿', '🌱'];
    function createLeaf() {
        const leaf = document.createElement('div');
        leaf.className = 'leaf';
        leaf.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        leaf.style.left = Math.random() * 100 + 'vw';
        leaf.style.fontSize = (Math.random() * 10 + 15) + 'px';
        leaf.style.animationDuration = (Math.random() * 3 + 3) + 's';
        if(container) container.appendChild(leaf);
        setTimeout(() => leaf.remove(), 6000);
    }
    setInterval(createLeaf, 400);
</script>
    </body>
</html>
